lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  - pattern: 'kafka.server<type=(.+), name=(.+)PerSec\w*><>Count'
    name: kafka_server_$1_$2_total
    type: COUNTER

  - pattern: 'kafka.server<type=(.+), name=(.+)><>Value'
    name: kafka_server_$1_$2
    type: GAUGE

  - pattern: 'kafka.controller<type=(.+), name=(.+)><>Value'
    name: kafka_controller_$1_$2
    type: GAUGE

  - pattern: 'kafka.controller<type=(.+), name=(.+)><>Count'
    name: kafka_controller_$1_$2_total
    type: COUNTER

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>(used|max)'
    name: jvm_memory_heap_$1_bytes
    type: GAUGE

  - pattern: 'java.lang<type=GarbageCollector, name=(.+)><>CollectionTime'
    name: jvm_gc_collection_time_ms
    labels:
      gc: "$1"
    type: COUNTER

  - pattern: 'kafka.network<type=RequestMetrics, name=(.+)TimeMs, request=(.+)><>(Count|Mean|Max)'
    name: kafka_request_$1_time_ms
    labels:
      request: "$2"
      stat: "$3"
    type: GAUGE 

  - pattern: 'kafka.network<type=RequestMetrics, name=RequestQueueTimeMs, request=(.+)><>(Count|Mean|Max)'
    name: kafka_request_queue_time_ms
    labels:
      request: "$1"
      stat: "$2"
    type: GAUGE
  - pattern: 'kafka.network<type=RequestMetrics, name=LocalTimeMs, request=(.+)><>(Count|Mean|Max)'
    name: kafka_request_local_time_ms
    labels:
      request: "$1"
      stat: "$2"
    type: GAUGE

  - pattern: 'kafka.network<type=RequestMetrics, name=ResponseSendTimeMs, request=(.+)><>(Count|Mean|Max)'
    name: kafka_request_response_send_time_ms
    labels:
      request: "$1"
      stat: "$2"
    type: GAUGE