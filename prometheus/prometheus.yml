global:
  scrape_interval: 15s

scrape_configs:
  - job_name: kafka-jmx
    static_configs:
      - targets: ["kafka:8080"]
        labels:
          _cluster: "kraft"
          _environment: "docker"
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: "benchmark"
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
