global:
  scrape_interval: 10s

scrape_configs:
  - job_name: kafka-jmx
    static_configs:
      - targets: ["kafka:8080"]
        labels:
          _cluster: "kraft"
          _environment: "docker"
  
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [container_name, container_label_com_docker_compose_service]
        regex: '.*(kafka|rabbitmq)*.'
        action: keep
      - source_labels: [container_name]
        regex: '^$'
        action: keep

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
